<!DOCTYPE html>
<html>
<head>
<title>Share Access – MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}

body{background:#f7f7f5;min-height:100vh;}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
.header-right{display:flex;align-items:center;gap:12px;}
.header-user{font-size:13px;color:#888;}
.btn-logout{
  background:transparent;color:#c0392b;border:1.5px solid #c0392b;
  border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s ease;
}
.btn-logout:hover{background:#c0392b;color:#fff;}

.page{
  max-width:560px;
  margin:0 auto;
  padding:48px 20px;
  animation:fadeUp .45s ease both;
}

.page-header{margin-bottom:32px;}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;color:#aaa;text-decoration:none;
  margin-bottom:16px;
  transition:color .2s;
}
.back-link:hover{color:#c0392b;}
.page h1{font-size:1.7rem;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em;}
.page h1 span{color:#c0392b;}
.page-sub{font-size:0.9rem;color:#999;margin-top:6px;}

.card{
  background:#fff;
  border-radius:20px;
  padding:36px;
  box-shadow:0 8px 40px rgba(0,0,0,0.07);
  margin-bottom:24px;
}

.form-group{margin-bottom:22px;}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:7px;}
input{
  width:100%;
  padding:11px 14px;
  border:1.5px solid #e8e8e8;
  border-radius:10px;
  font-size:14px;
  color:#1a1a1a;
  background:#fafafa;
  transition:border-color .2s,box-shadow .2s;
  outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;
}
input:focus{
  border-color:#c0392b;
  box-shadow:0 0 0 3px rgba(192,57,43,0.08);
  background:#fff;
}

.submit-btn{
  width:100%;
  padding:14px;
  background:#c0392b;color:#fff;
  border:none;border-radius:10px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 4px 14px rgba(192,57,43,0.3);
  margin-top:8px;
}
.submit-btn:hover{background:#a93226;transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,57,43,0.35);}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{background:#e0a09a;cursor:not-allowed;transform:none;box-shadow:none;}

/* Shared list */
.section-title{
  font-size:13px;font-weight:700;color:#444;
  margin-bottom:14px;
  text-transform:uppercase;letter-spacing:0.05em;
}

.caregiver-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:#fafafa;
  border:1.5px solid #f0f0ee;
  border-radius:12px;
  margin-bottom:10px;
}
.caregiver-info{display:flex;align-items:center;gap:12px;}
.caregiver-avatar{
  width:38px;height:38px;
  border-radius:50%;
  background:#fff0ef;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#c0392b;
  flex-shrink:0;
}
.caregiver-email{font-size:14px;font-weight:600;color:#1a1a1a;}
.caregiver-date{font-size:12px;color:#aaa;margin-top:2px;}

.revoke-btn{
  background:transparent;
  color:#c0392b;
  border:1.5px solid #f0d0ce;
  border-radius:8px;
  padding:6px 14px;
  font-size:12px;font-weight:600;
  cursor:pointer;
  transition:all .2s;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.revoke-btn:hover{background:#fff0ef;border-color:#c0392b;}

.empty-msg{
  text-align:center;
  font-size:14px;color:#bbb;
  padding:24px 0;
}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a1a1a;color:#fff;
  padding:12px 24px;border-radius:10px;
  font-size:14px;font-weight:500;
  opacity:0;pointer-events:none;
  transition:all .3s ease;
  z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#c0392b;}
.toast.success{background:#27ae60;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
<link rel="icon" type="image/png" href="logo.png">
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <img src="pill.png"> MyPills
  </a>
  <div class="header-right">
    <span class="header-user" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <a class="back-link" href="app.html">← Back to dashboard</a>
    <h1>Share <span>Access</span></h1>
    <p class="page-sub">Give a caregiver read-only access to your medications and calendar.</p>
  </div>

  <!-- ADD CAREGIVER -->
  <div class="card">
    <div class="form-group" style="margin-bottom:0;">
      <label>Caregiver's Email Address</label>
      <input type="email" id="caregiverEmail" placeholder="e.g. parent@example.com">
    </div>
    <button class="submit-btn" id="submitBtn" onclick="grantAccess()">Grant Access</button>
  </div>

  <!-- CURRENT CAREGIVERS -->
  <div class="card">
    <div class="section-title">People with access</div>
    <div id="caregiverList"><div class="empty-msg">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, user => {
    if (!user) { window.location = "continue.html"; return; }
    currentUser = user;
    document.getElementById("userEmail").textContent = user.displayName || user.email;
    loadCaregivers();
  });
});

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + type + " show";
  setTimeout(() => t.className = "toast", 3000);
}

async function loadCaregivers() {
  const list = document.getElementById("caregiverList");
  const snap = await getDocs(collection(db, "users", currentUser.uid, "sharedAccess"));

  if (snap.empty) {
    list.innerHTML = `<div class="empty-msg">No one has access yet.</div>`;
    return;
  }

  list.innerHTML = "";
  snap.forEach(docSnap => {
    const data = docSnap.data();
    const email = docSnap.id;
    const initial = email[0].toUpperCase();
    const granted = data.grantedAt?.toDate
      ? data.grantedAt.toDate().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
      : "";

    const row = document.createElement("div");
    row.className = "caregiver-row";
    row.id = `row-${CSS.escape(email)}`;
    row.innerHTML = `
      <div class="caregiver-info">
        <div class="caregiver-avatar">${initial}</div>
        <div>
          <div class="caregiver-email">${email}</div>
          ${granted ? `<div class="caregiver-date">Access granted ${granted}</div>` : ""}
        </div>
      </div>
      <button class="revoke-btn" onclick="revokeAccess('${email}')">Revoke</button>
    `;
    list.appendChild(row);
  });
}

async function grantAccess() {
  const email = document.getElementById("caregiverEmail").value.trim().toLowerCase();
  if (!email || !email.includes("@")) {
    showToast("Please enter a valid email.", "error");
    return;
  }
  if (email === currentUser.email.toLowerCase()) {
    showToast("You can't share access with yourself.", "error");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  try {
    await setDoc(
      doc(db, "users", currentUser.uid, "sharedAccess", email),
      {
        email,
        grantedAt: Timestamp.now(),
        patientName: currentUser.displayName || currentUser.email
      }
    );
    document.getElementById("caregiverEmail").value = "";

    // Always call /invite — backend checks if they have an account and skips if so
    try {
      await fetch("https://api.mypills.kidslearninglab.com/invite", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          invitee_email: email,
          inviter_name: currentUser.displayName || currentUser.email,
          inviter_email: currentUser.email
        })
      });
    } catch(_) {}

    showToast("Access granted!", "success");
    await loadCaregivers();
  } catch(e) {
    showToast("Error: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Grant Access";
  }
}

async function revokeAccess(email) {
  try {
    await deleteDoc(doc(db, "users", currentUser.uid, "sharedAccess", email));
    showToast("Access revoked.", "");
    await loadCaregivers();
  } catch(e) {
    showToast("Error: " + e.message, "error");
  }
}

async function logout() {
  await signOut(auth);
  window.location = "index.html";
}

window.grantAccess = grantAccess;
window.revokeAccess = revokeAccess;
window.logout = logout;
</script>
</body>
</html>
