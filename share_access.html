<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="logo.png">
<title>Share Access – MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
  body{background:#f7f7f5;min-height:100vh;color:#1a1a1a;}

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 40px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,0,0,0.08);
    position:sticky;top:0;z-index:100;
  }
  .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
  .logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
  .header-user{font-size:13px;color:#888;margin-right:12px;}
  .btn-logout{
    background:transparent;color:#c0392b;border:1.5px solid #c0392b;
    border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;
    cursor:pointer;transition:all .2s ease;
  }
  .btn-logout:hover{background:#c0392b;color:#fff;}

  .page{max-width:560px;margin:0 auto;padding:48px 20px;animation:fadeUp .45s ease both;}
  .page-header{margin-bottom:32px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#aaa;text-decoration:none;margin-bottom:16px;transition:color .2s;}
  .back-link:hover{color:#c0392b;}
  .page h1{font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;}
  .page h1 span{color:#c0392b;}
  .page-sub{font-size:0.9rem;color:#999;margin-top:6px;}

  .card{background:#fff;border-radius:20px;padding:32px;box-shadow:0 8px 40px rgba(0,0,0,0.05);margin-bottom:24px;}
  .form-group{margin-bottom:20px;}
  label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:8px;}
  input{
    width:100%;padding:12px 16px;border:1.5px solid #eee;border-radius:12px;
    font-size:14px;background:#fafafa;transition:all .2s;outline:none;
  }
  input:focus{border-color:#c0392b;background:#fff;box-shadow:0 0 0 4px rgba(192,57,43,0.05);}

  .submit-btn{
    width:100%;padding:14px;background:#c0392b;color:#fff;border:none;
    border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
    transition:all .2s ease;box-shadow:0 4px 12px rgba(192,57,43,0.2);
  }
  .submit-btn:hover{transform:translateY(-1px);}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

  .section-title{font-size:12px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:16px;}
  .caregiver-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px;background:#fcfcfc;border:1px solid #f0f0ee;
    border-radius:14px;margin-bottom:12px;
  }
  .caregiver-info{display:flex;align-items:center;gap:12px;}
  .caregiver-avatar{
    width:36px;height:36px;border-radius:10px;background:#fff0ef;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;color:#c0392b;
  }
  .caregiver-email{font-size:14px;font-weight:600;color:#1a1a1a;}

  .revoke-btn{
    background:transparent;color:#c0392b;border:1px solid #f0d0ce;
    border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;
    cursor:pointer;transition:all .2s;
  }
  .revoke-btn:hover{background:#fff0ef;border-color:#c0392b;}

  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(40px);
    background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:12px;
    font-size:14px;font-weight:500;opacity:0;transition:all 0.4s ease;
    z-index:1000;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.error{background:#c0392b;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header>
  <a class="logo" href="app.html"><img src="pill.png"> MyPills</a>
  <div>
    <span class="header-user" id="userHeaderEmail"></span>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <a class="back-link" href="app.html">← Back to dashboard</a>
    <h1>Share <span>Access</span></h1>
    <p class="page-sub">Allow caregivers to monitor your medication adherence.</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Caregiver's Email</label>
      <input type="email" id="caregiverEmail" placeholder="caregiver@email.com">
    </div>
    <button class="submit-btn" id="submitBtn" onclick="grantAccess()">Grant Access</button>
  </div>

  <div class="card">
    <div class="section-title">People with Access</div>
    <div id="caregiverList"><div style="text-align:center; padding:20px; color:#ccc;">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9b4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = isError ? "toast show error" : "toast show";
  setTimeout(() => t.classList.remove("show"), 3000);
}

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location = "continue.html"; return; }
    loadPatients(user.email);
  });
});

function setupRealtimeList(uid) {
  onSnapshot(doc(db, "users", uid), (snap) => {
    const listDiv = document.getElementById("caregiverList");
    const caregivers = snap.data()?.caregivers || [];

    if (caregivers.length === 0) {
      listDiv.innerHTML = `<div style="text-align:center; padding:20px; color:#bbb; font-size:14px;">No caregivers added.</div>`;
      return;
    }

    listDiv.innerHTML = caregivers.map(email => `
      <div class="caregiver-row">
        <div class="caregiver-info">
          <div class="caregiver-avatar">${email[0].toUpperCase()}</div>
          <div class="caregiver-email">${email}</div>
        </div>
        <button class="revoke-btn" onclick="revokeAccess('${email}')">Revoke</button>
      </div>
    `).join('');
  });
}

window.grantAccess = async () => {
  const emailInp = document.getElementById("caregiverEmail");
  const email = emailInp.value.trim().toLowerCase();
  if (!email.includes('@')) return showToast("Enter a valid email", true);

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  const user = auth.currentUser;

  try {
    await updateDoc(doc(db, "users", user.uid), {
      // Keep the patient's name updated so the caregiver sees it
      displayName: user.displayName || user.email.split('@')[0],
      caregivers: arrayUnion(email)
    });
    showToast(`Access granted to ${email}`);
    emailInp.value = "";
  } catch (e) {
    showToast("Error granting access", true);
  } finally {
    btn.disabled = false;
  }
};

window.revokeAccess = async (email) => {
  if (!confirm(`Revoke access for ${email}?`)) return;
  const user = auth.currentUser;
  try {
    await updateDoc(doc(db, "users", user.uid), {
      caregivers: arrayRemove(email)
    });
    showToast("Access revoked");
  } catch (e) {
    showToast("Error revoking access", true);
  }
};

window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>
