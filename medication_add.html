<!DOCTYPE html>
<html>
<head>
<title>New Medication – MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}

body{background:#f7f7f5;min-height:100vh;}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
.header-right{display:flex;align-items:center;gap:12px;}
.header-user{font-size:13px;color:#888;}
.btn-logout{
  background:transparent;color:#c0392b;border:1.5px solid #c0392b;
  border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s ease;
}
.btn-logout:hover{background:#c0392b;color:#fff;}

/* PAGE */
.page{
  max-width:560px;
  margin:0 auto;
  padding:48px 20px;
  animation:fadeUp .45s ease both;
}

.page-header{margin-bottom:32px;}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;color:#aaa;text-decoration:none;
  margin-bottom:16px;
  transition:color .2s;
}
.back-link:hover{color:#c0392b;}
.page h1{font-size:1.7rem;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em;}
.page h1 span{color:#c0392b;}
.page-sub{font-size:0.9rem;color:#999;margin-top:6px;}

/* CARD */
.card{
  background:#fff;
  border-radius:20px;
  padding:36px;
  box-shadow:0 8px 40px rgba(0,0,0,0.07);
}

.form-group{margin-bottom:22px;}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:7px;}
input,textarea,select{
  width:100%;
  padding:11px 14px;
  border:1.5px solid #e8e8e8;
  border-radius:10px;
  font-size:14px;
  color:#1a1a1a;
  background:#fafafa;
  transition:border-color .2s,box-shadow .2s;
  outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;
}
input:focus,textarea:focus,select:focus{
  border-color:#c0392b;
  box-shadow:0 0 0 3px rgba(192,57,43,0.08);
  background:#fff;
}
textarea{resize:vertical;min-height:90px;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.optional-tag{
  font-size:11px;font-weight:400;color:#bbb;margin-left:6px;
}

.submit-btn{
  width:100%;
  padding:14px;
  background:#c0392b;color:#fff;
  border:none;border-radius:10px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 4px 14px rgba(192,57,43,0.3);
  margin-top:8px;
}
.submit-btn:hover{background:#a93226;transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,57,43,0.35);}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{background:#e0a09a;cursor:not-allowed;transform:none;box-shadow:none;}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a1a1a;color:#fff;
  padding:12px 24px;border-radius:10px;
  font-size:14px;font-weight:500;
  opacity:0;pointer-events:none;
  transition:all .3s ease;
  z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#c0392b;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <img src="pill.png"> MyPills
  </a>
  <div class="header-right">
    <span class="header-user" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <a class="back-link" href="app.html">← Back to dashboard</a>
    <h1>Add <span>Medication</span></h1>
    <p class="page-sub">Fill in the details below to add a new medication.</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Medication Name</label>
      <input type="text" id="name" placeholder="e.g. Metformin">
    </div>

    <div class="form-group">
      <label>Dosage</label>
      <div style="display:flex;gap:10px;">
        <input type="number" id="dosageValue" placeholder="e.g. 500" min="0" step="any" style="flex:1;">
        <select id="dosageUnit" style="width:110px;">
          <option value="MG">mg</option>
          <option value="G">g</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Schedule</label>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="number" id="scheduleCount" placeholder="e.g. 2" min="1" step="1" style="flex:1;">
        <span style="font-size:13px;color:#888;white-space:nowrap;">time(s) per</span>
        <select id="scheduleUnit" style="width:130px;">
          <option value="HOURLY">Hour</option>
          <option value="DAILY" selected>Day</option>
          <option value="WEEKLY">Week</option>
          <option value="MONTHLY">Month</option>
          <option value="YEARLY">Year</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" id="startDate">
      </div>
      <div class="form-group">
        <label>Stop Date <span class="optional-tag">optional</span></label>
        <input type="date" id="stopDate">
      </div>
    </div>

    <div class="form-group">
      <label>Expiry Date <span class="optional-tag">optional</span></label>
      <input type="date" id="expiryDate">
    </div>

    <div class="form-group">
      <label>Notes <span class="optional-tag">optional</span></label>
      <textarea id="notes" placeholder="Any extra instructions from your doctor..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="saveMedication()">Save Medication</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, Timestamp, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, user => {
    if (!user) { window.location = "continue.html"; return; }
    currentUser = user;
    document.getElementById("userEmail").textContent = user.displayName || user.email;
  });
});

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "") + " show";
  setTimeout(() => t.className = "toast", 3000);
}

async function saveMedication() {
  const name          = document.getElementById("name").value.trim();
  const dosageValue   = document.getElementById("dosageValue").value.trim();
  const dosageUnit    = document.getElementById("dosageUnit").value;
  const scheduleCount = document.getElementById("scheduleCount").value.trim();
  const scheduleUnit  = document.getElementById("scheduleUnit").value;
  const startRaw      = document.getElementById("startDate").value;
  const stopRaw       = document.getElementById("stopDate").value;
  const expRaw        = document.getElementById("expiryDate").value;
  const notes         = document.getElementById("notes").value.trim();

  if (!name || !dosageValue || !scheduleCount || !startRaw) {
    showToast("Please fill in name, dosage, schedule, and start date.", true);
    return;
  }

  const dosage   = [dosageValue, dosageUnit];
  const schedule = [parseInt(scheduleCount), scheduleUnit];

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  try {
    const docRef = await addDoc(
  collection(db, "users", currentUser.uid, "medications"),
  {
    name,
    dosage,
    schedule,
    startDate:  Timestamp.fromDate(new Date(startRaw)),
    stopDate:   stopRaw  ? Timestamp.fromDate(new Date(stopRaw))  : null,
    expiryDate: expRaw   ? Timestamp.fromDate(new Date(expRaw))   : null,
    notes:      notes || ""
  }
);

// create empty logs subcollection with a placeholder doc
await setDoc(
  doc(db, "users", currentUser.uid, "medications", docRef.id, "logs", "_init"),
  { initialized: true }
);
    showToast("Medication saved!");
    setTimeout(() => window.location = "app.html", 1200);
  } catch(e) {
    showToast("(Turn off ad blockers, we don't have any ads) Error: " + e.message, true);
    btn.disabled = false;
    btn.textContent = "Save Medication";
  }
}

async function logout() {
  await signOut(auth);
  window.location = "index.html";
}

window.saveMedication = saveMedication;
window.logout = logout;
</script>
</body>
</html>
