<!DOCTYPE html>
<html>
<head>
<title>Dashboard – MyPills Analytics</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f5;min-height:100vh;padding:48px 20px;}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
  border-radius:10px;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
.stats{display:flex;gap:24px;margin:40px 0;flex-wrap:wrap;}
.stat-card{
  background:#fff;border-radius:16px;padding:20px 25px;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
  flex:1;min-width:180px;text-align:center;
}
.stat-title{font-size:14px;color:#888;margin-bottom:8px;}
.stat-value{font-size:22px;font-weight:700;color:#c0392b;}
canvas{background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:40px;}
.section-label{font-size:16px;font-weight:700;color:#c0392b;margin-bottom:12px;}
</style>
</head>
<body>

<header>
  <a class="logo" href="app.html"><img src="pill.png"> MyPills</a>
  <div class="header-right">
    <span class="header-user" id="userEmail"></span>
  </div>
</header>

<div class="page">

  <div class="stats">
    <div class="stat-card">
      <div class="stat-title">Overall Adherence</div>
      <div class="stat-value" id="overallAdherence">--%</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Current Streak</div>
      <div class="stat-value" id="currentStreak">-- days</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Longest Streak</div>
      <div class="stat-value" id="longestStreak">-- days</div>
    </div>
  </div>

  <div class="section-label">Daily Adherence (%)</div>
  <canvas id="adherenceChart" height="150"></canvas>

  <div class="section-label">Daily Doses Taken vs Missed</div>
  <canvas id="doseBarChart" height="150"></canvas>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, async user => {
    if(!user) { window.location = "index.html"; return; }
    currentUser = user;
    document.getElementById("userEmail").textContent = user.displayName || user.email;
    await loadAnalytics();
  });
});

function dateKey(d){ return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${d.getFullYear()}`; }
function dateKeyToDate(key){ const [m,d,y]=key.split("/").map(Number); return new Date(y,m-1,d); }

async function loadAnalytics(){
  const medsSnap = await getDocs(collection(db, "users", currentUser.uid, "medications"));
  const meds = medsSnap.docs.filter(d=>d.id!=="_init" && d.data().name).map(d=>({id:d.id,...d.data()}));

  let dailyData = {};
  const today = new Date(); today.setHours(0,0,0,0);
  const WEEK_DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  for(const med of meds){
    const start = med.startDate?.toDate();
    const stop  = med.stopDate?.toDate();
    const expiry= med.expiryDate?.toDate();
    const end = [stop,expiry].filter(Boolean).sort((a,b)=>a-b)[0];
    if(!start) continue;

    let sel = new Date(start); sel.setHours(0,0,0,0);
    while(sel < today && (!end || sel <= end)){
      const unit = Array.isArray(med.schedule)?med.schedule[1]:"DAILY";
      const count= Array.isArray(med.schedule)?parseInt(med.schedule[0])||1:1;
      const times= med.times||[];

      for(let d=1;d<=count;d++){
        let applies=true;
        if(unit==="WEEKLY" && times[d-1]) applies = times[d-1].day===WEEK_DAYS[sel.getDay()];
        if(unit==="MONTHLY" && times[d-1]) applies = parseInt(times[d-1].day)===sel.getDate();
        if(unit==="YEARLY" && times[d-1]) applies = parseInt(times[d-1].month)===sel.getMonth()+1 && parseInt(times[d-1].day)===sel.getDate();
        if(!applies) continue;

        const key=dateKey(sel);
        if(!dailyData[key]) dailyData[key]={scheduled:0,taken:0};
        dailyData[key].scheduled++;

        const logsSnap = await getDocs(query(
          collection(db, "users", currentUser.uid, "medications", med.id, "logs"),
          where("day","==",key),
          where("dose","==",d)
        ));
        if(!logsSnap.empty) dailyData[key].taken++;
      }
      sel.setDate(sel.getDate()+1);
    }
  }

  const dates=Object.keys(dailyData).sort((a,b)=>dateKeyToDate(a)-dateKeyToDate(b));
  const adherencePercent = dates.map(d=>dailyData[d].scheduled?Math.round((dailyData[d].taken/dailyData[d].scheduled)*100):0);

  // Overall adherence
  const totalScheduled = dates.reduce((s,d)=>s+dailyData[d].scheduled,0);
  const totalTaken = dates.reduce((s,d)=>s+dailyData[d].taken,0);
  const overallAdherence = totalScheduled?Math.round((totalTaken/totalScheduled)*100):0;
  document.getElementById("overallAdherence").textContent = overallAdherence+"%";

  // Streaks
  let currentStreak=0,longestStreak=0,tempStreak=0;
  adherencePercent.forEach(p=>{
    if(p===100){ tempStreak++; currentStreak=tempStreak; }
    else tempStreak=0;
    if(currentStreak>longestStreak) longestStreak=currentStreak;
  });
  document.getElementById("currentStreak").textContent=currentStreak+" days";
  document.getElementById("longestStreak").textContent=longestStreak+" days";

  // Line chart for adherence %
  new Chart(document.getElementById('adherenceChart').getContext('2d'),{
    type:'line',
    data:{
      labels:dates,
      datasets:[{
        label:'Daily Adherence (%)',
        data:adherencePercent,
        fill:true,
        backgroundColor:'rgba(192,57,43,0.2)',
        borderColor:'#c0392b',
        tension:0.3,
        pointRadius:4,
        pointBackgroundColor:'#c0392b'
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:true,max:100,ticks:{callback:v=>v+"%"}},
        x:{ticks:{maxRotation:90,minRotation:45}}
      }
    }
  });

  // Bar chart for taken vs missed
  const takenData = dates.map(d=>dailyData[d].taken);
  const missedData = dates.map(d=>dailyData[d].scheduled - dailyData[d].taken);
  new Chart(document.getElementById('doseBarChart').getContext('2d'),{
    type:'bar',
    data:{
      labels:dates,
      datasets:[
        {label:'Taken', data:takenData, backgroundColor:'#c0392b'},
        {label:'Missed', data:missedData, backgroundColor:'rgba(192,57,43,0.3)'}
      ]
    },
    options:{
      responsive:true,
      plugins:{legend:{position:'top'}},
      scales:{
        y:{beginAtZero:true, precision:0},
        x:{ticks:{maxRotation:90,minRotation:45}}
      }
    }
  });

}
</script>
</body>
</html>
