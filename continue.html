<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="logo.png">
<title>Sign In – MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person" />
    <style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}

body{background:#f7f7f5;min-height:100vh;}

header{
  display:flex;align-items:center;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}

/* CENTER CARD */
.page{
  min-height:calc(100vh - 73px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  animation:fadeUp .45s ease both;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:48px 44px;
  width:100%;max-width:400px;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
  text-align:center;
}

.card-icon{
  width:64px;height:64px;
  background:#fff0ef;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
}
.card-icon img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}

.card h2{
  font-size:1.55rem;
  font-weight:700;
  color:#1a1a1a;
  letter-spacing:-0.02em;
  margin-bottom:8px;
}
.card p{
  font-size:0.9rem;
  color:#888;
  line-height:1.6;
  margin-bottom:32px;
}

.google-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;
  padding:13px 20px;
  border-radius:10px;
  border:1.5px solid #e0e0e0;
  background:#fff;
  color:#1a1a1a;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.google-btn:hover{border-color:#c0392b;box-shadow:0 4px 16px rgba(192,57,43,0.15);transform:translateY(-1px);}
.google-btn:active{transform:scale(0.98);}

.google-btn svg{flex-shrink:0;}

.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
  color:#ccc;font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee;}

.back{
  font-size:13px;color:#aaa;
  text-decoration:none;
  transition:color .2s;
}
.back:hover{color:#c0392b;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <img src="pill.png"> MyPills
  </a>
</header>

<div class="page">
  <div class="card">
    <div class="card-icon"><span class="material-symbols-outlined">
person
</span></div>
    <h2>Welcome back</h2>
    <p>Sign in to manage your medications, reminders, and appointments.</p>

    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>
    <a class="back" href="index.html" style="text-decoration: underline;">Back to home</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, user => {
    if(user) window.location = "app.html";
  });
});

function googleLogin(){
  signInWithPopup(auth, provider)
    .then(() => window.location = "app.html")
    .catch(e => alert(e.message));
}

window.googleLogin = googleLogin;
</script>
</body>
</html>
