<!DOCTYPE html>

<html>
<head>
  <link rel="icon" type="image/png" href="logo.png">
  <title>Sign In: MyPills</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus%20Jakarta%20Sans:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
*{font-family: "Plus Jakarta Sans" !important}


:root {
  --coral:   #FF5C47;
  --sky:     #4FC3F7;
  --lime:    #A8E063;
  --purple:  #C084FC;
  --yellow:  #FFD166;
  --ink:     #f8f8f8;
  --card-bg: #FFFFFF;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}


/* ── MAIN ── */
.page {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
  position: relative; z-index: 10;
}

.card {
  background: var(--card-bg);
  border-radius: 28px;
  padding: 52px 44px 44px;
  width: 100%; max-width: 420px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.05),
    0 32px 80px rgba(0,0,0,0.15),
    0 0 40px rgba(0,0,0,0.05);
  animation: popIn .5s cubic-bezier(.22,1,.36,1) both;
  position: relative;
  overflow: hidden;
}

/* Rainbow top stripe */
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg,
    var(--coral) 0%, var(--yellow) 25%,
    var(--lime) 50%, var(--sky) 75%, var(--purple) 100%);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(.94) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── PILL BADGE ── */
.pill-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: #fff0f0; border: 1.5px solid #ffcccc;
  border-radius: 100px; padding: 6px 14px;
  margin-bottom: 28px;
}
.pill-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #cc0000;
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.5); opacity:.6; }
}
.pill-badge span {
  font-size: 12px; font-weight: 600;
  color: #cc0000; letter-spacing: 0.04em; text-transform: uppercase;
}

.card h2 {
  font-family: 'Fraunces', serif;
  font-size: 2rem; font-weight: 700;
  color: #8B0000; letter-spacing: -0.03em;
  line-height: 1.15; margin-bottom: 10px;
}
.card h2 em {
  font-style: italic; font-weight: 400;
  color: #cc0000;
}

.card p {
  font-size: 14px; color: #555; line-height: 1.65;
  margin-bottom: 36px;
}

/* ── GOOGLE BUTTON ── */
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 11px;
  width: 100%; padding: 15px 20px;
  border-radius: 14px;
  border: 3px solid transparent;
  background: linear-gradient(white, white) padding-box,
              linear-gradient(90deg,
                #FF0000, #FF7700, #FFDD00,
                #00CC44, #0088FF, #8800FF, #FF0088, #FF0000
              ) border-box;
  background-size: 100% 100%, 300% 100%;
  color: #1a1a1a; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: all .25s cubic-bezier(.22,1,.36,1);
  box-shadow:
    0 4px 20px rgba(255,0,0,0.2),
    0 0 0 1px rgba(255,255,255,0.5) inset;
  position: relative; overflow: hidden;
  animation: rainbowShift 3s linear infinite;
}
@keyframes rainbowShift {
  0%   { background-position: 100% 100%, 0% 50%; }
  100% { background-position: 100% 100%, 100% 50%; }
}
.google-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg,
    rgba(255,0,0,.04), rgba(255,221,0,.04),
    rgba(0,204,68,.04), rgba(0,136,255,.04));
  opacity: 0; transition: opacity .25s;
}
.google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,0,0,0.3), 0 0 20px rgba(255,136,0,0.2); }
.google-btn:hover::after { opacity: 1; }
.google-btn:active { transform: scale(.98); }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 22px 0; color: #ccc; font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: #eee;
}

.nav button{
  background:#c0392b;color:#fff;border:none;
  border-radius:8px;padding:10px 22px;
  font-size:14px;font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 4px 14px rgba(192,57,43,0.35);
}
.nav button:hover{background:#a93226;transform:translateY(-1px);box-shadow:0 6px 18px rgba(192,57,43,0.4);}
.nav button:active{transform:scale(0.97);}

/* ── BACK LINK ── */
.back {
  font-size: 13px; color: #777; text-decoration: none;
  transition: color .2s; display: inline-block;
}
.back:hover { color: var(--coral); }

.footer-row {
  display: flex; align-items: center; justify-content: center; gap: 6px;
}


  </style>
</head>
<body>
<header>
  <a class="logo" href="index.html">
    <img src="pill.png"> MyPills
  </a>
  <div class="nav">
    <button onclick="window.location='continue.html'">Log In/Sign Up</button>
  </div>
</header>
<div class="page">
  <div class="card">
    <div class="pill-badge">
      <div class="pill-dot"></div>
      <span>Medication Tracker</span>
    </div>


<h2>Welcome <em>back</em></h2>
<p>Sign in to manage your medications, reminders, and appointments.</p>

<button class="google-btn" onclick="googleLogin()">
  <svg width="18" height="18" viewBox="0 0 18 18">
    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
    <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
  </svg>
  Continue with Google
</button>

<div class="divider">or</div>

<div class="footer-row">
  <a class="back" href="index.html" style="text-decoration:underline;">Back to home</a>
</div>


  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, user => {
    if(user) window.location = "app.html";
  });
});

function googleLogin(){
  signInWithPopup(auth, provider)
    .then(() => window.location = "app.html")
    .catch(e => alert(e.message));
}

window.googleLogin = googleLogin;
</script>

</body>
</html>
