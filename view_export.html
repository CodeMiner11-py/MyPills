<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>View Export – MyPills</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f5;min-height:100vh;color:#1a1a1a;}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
.header-tag{font-size:12px;font-weight:600;color:#888;background:#f0f0ee;padding:4px 12px;border-radius:20px;}

/* UPLOAD ZONE */
.page{max-width:680px;margin:0 auto;padding:64px 20px;animation:fadeUp .45s ease both;}

.upload-hero{text-align:center;margin-bottom:48px;}
.upload-hero h1{font-size:2rem;font-weight:800;letter-spacing:-0.03em;color:#1a1a1a;margin-bottom:10px;}
.upload-hero h1 span{color:#c0392b;}
.upload-hero p{font-size:15px;color:#999;line-height:1.6;}

.drop-zone{
  border:2px dashed #e0e0dc;
  border-radius:20px;
  padding:56px 32px;
  text-align:center;
  background:#fff;
  cursor:pointer;
  transition:all .25s ease;
  position:relative;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:#c0392b;
  background:#fff9f9;
}
.drop-icon{font-size:3rem;margin-bottom:16px;display:block;}
.drop-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px;}
.drop-sub{font-size:13px;color:#aaa;}
.drop-sub span{color:#c0392b;font-weight:600;cursor:pointer;}
#fileInput{display:none;}

.drop-zone.has-file{border-style:solid;border-color:#c0392b;background:#fff9f9;}
.drop-zone.has-file .drop-icon::after{content:"✓";font-size:2rem;}
.drop-zone.has-file .drop-icon{font-size:0;}

/* REPORT */
#report{display:none;margin-top:40px;animation:fadeUp .4s ease both;}

.profile-card{
  background:#fff;border-radius:20px;padding:32px;
  box-shadow:0 4px 24px rgba(0,0,0,0.07);
  margin-bottom:24px;
  border-left:5px solid #c0392b;
}
.profile-top{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.profile-avatar{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#c0392b,#e74c3c);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;color:#fff;flex-shrink:0;
}
.profile-name{font-size:1.4rem;font-weight:800;color:#1a1a1a;letter-spacing:-0.02em;}
.profile-email{font-size:13px;color:#888;margin-top:2px;}
.profile-exported{font-size:11px;color:#bbb;margin-top:4px;}

.profile-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;}
.meta-pill{
  font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;
  background:#f5f5f3;color:#666;
}
.meta-pill.red{background:#fff0ef;color:#c0392b;}

/* SECTION */
.section{margin-bottom:28px;}
.section-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;
}
.section-title{font-size:1rem;font-weight:700;color:#1a1a1a;}
.section-count{font-size:12px;font-weight:600;background:#f0f0ee;color:#888;padding:3px 10px;border-radius:20px;}

/* MED CARDS */
.item-card{
  background:#fff;border-radius:14px;padding:20px 22px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
  margin-bottom:12px;
  border:1px solid #f0f0ee;
  transition:box-shadow .2s;
}
.item-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.09);}
.item-card:last-child{margin-bottom:0;}

.item-name{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.item-rows{display:flex;flex-direction:column;gap:4px;}
.item-row{display:flex;gap:8px;font-size:13px;}
.item-row-label{color:#bbb;font-weight:600;min-width:80px;flex-shrink:0;}
.item-row-value{color:#555;}

.appt-datetime{
  display:inline-block;
  background:#fff0ef;color:#c0392b;
  font-size:12px;font-weight:700;
  padding:4px 12px;border-radius:20px;
  margin-bottom:10px;
}
.appt-maps-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:#c0392b;
  text-decoration:none;margin-top:8px;
}
.appt-maps-link:hover{text-decoration:underline;}

.empty-msg{
  text-align:center;padding:32px;
  background:#fff;border-radius:14px;
  color:#bbb;font-size:14px;
  border:1px solid #f0f0ee;
}

.reset-btn{
  display:block;width:100%;margin-top:32px;
  padding:14px;border:1.5px solid #e0e0dc;
  border-radius:12px;background:transparent;
  font-size:14px;font-weight:600;color:#aaa;cursor:pointer;
  transition:all .2s;
}
.reset-btn:hover{border-color:#c0392b;color:#c0392b;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><img src="pill.png"> MyPills</a>
  <span class="header-tag">Public Viewer</span>
</header>

<div class="page">
  <div class="upload-hero">
    <h1>View a <span>MyPills</span> Export</h1>
    <p>Upload a .txt export file to view medications and appointments in a readable format.<br>No sign-in required. Nothing is uploaded anywhere.</p>
  </div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <span class="drop-icon">📄</span>
    <div class="drop-title">Drop your export file here</div>
    <div class="drop-sub">or <span>browse to upload</span> a .txt file</div>
    <input type="file" id="fileInput" accept=".txt">
  </div>

  <div id="report">
    <!-- Filled by JS -->
  </div>
</div>

<script>
const dropZone   = document.getElementById("dropZone");
const fileInput  = document.getElementById("fileInput");
const report     = document.getElementById("report");

// Drag & drop
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) processFile(fileInput.files[0]);
});

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => parseAndRender(e.target.result, file.name);
  reader.readAsText(file);
  dropZone.classList.add("has-file");
  dropZone.querySelector(".drop-title").textContent = file.name;
  dropZone.querySelector(".drop-sub").textContent = "Click to change file";
}

// ── Parser ──────────────────────────────────────────────────────────────────
function parseExport(text) {
  const lines = text.split("\n").map(l => l.trimEnd());
  const result = {
    type: null, // "MEDICATIONS" or "APPOINTMENTS"
    exported: null,
    user: null, email: null,
    sharingWith: [], canView: [],
    medications: [], appointments: []
  };

  // Detect type
  if (text.includes("MYPILLS DATA EXPORT (COMBINED)"))     result.type = "COMBINED";
  else if (text.includes("MYPILLS DATA EXPORT (MEDICATIONS)")) result.type = "MEDICATIONS";
  else if (text.includes("MYPILLS DATA EXPORT (APPOINTMENTS)")) result.type = "APPOINTMENTS";
  else result.type = "UNKNOWN";

  const val = (line, prefix) => line.startsWith(prefix) ? line.slice(prefix.length).trim() : null;
  const splitList = s => s === "None" ? [] : s.split(",").map(x => x.trim()).filter(Boolean);

  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // Header fields
    if (line.startsWith("Exported:"))    result.exported    = line.slice("Exported:".length).trim();
    if (line.startsWith("USER:"))        result.user        = line.slice("USER:".length).trim();
    if (line.startsWith("EMAIL:"))       result.email       = line.slice("EMAIL:".length).trim();
    if (line.startsWith("SHARING ACCESS WITH:")) result.sharingWith = splitList(line.slice("SHARING ACCESS WITH:".length).trim());
    if (line.startsWith("ABLE TO VIEW DATA OF:")) result.canView = splitList(line.slice("ABLE TO VIEW DATA OF:".length).trim());

    // Medication block
    if (/^Medication #\d+:/.test(line)) {
      const med = { name: line.replace(/^Medication #\d+:\s*/, ""), dosage:"", schedule:"", startDate:"", endDate:"", expiryDate:"", notes:"" };
      i++;
      while (i < lines.length && lines[i].startsWith("  ")) {
        const l = lines[i].trim();
        if (l.startsWith("Dosage:"))      med.dosage     = l.slice("Dosage:".length).trim();
        if (l.startsWith("Schedule:"))    med.schedule   = l.slice("Schedule:".length).trim();
        if (l.startsWith("Start Date:"))  med.startDate  = l.slice("Start Date:".length).trim();
        if (l.startsWith("End Date:"))    med.endDate    = l.slice("End Date:".length).trim();
        if (l.startsWith("Expiry Date:")) med.expiryDate = l.slice("Expiry Date:".length).trim();
        if (l.startsWith("Notes:"))       med.notes      = l.slice("Notes:".length).trim();
        i++;
      }
      result.medications.push(med);
      continue;
    }

    // Appointment block
    if (/^Appointment #\d+:/.test(line)) {
      const appt = { title: line.replace(/^Appointment #\d+:\s*/, ""), doctor:"", provider:"", datetime:"", address:"", mapsLink:"", notes:"" };
      i++;
      while (i < lines.length && (lines[i].startsWith("  ") || lines[i].startsWith("Link"))) {
        const l = lines[i].trim();
        if (l.startsWith("Doctor:"))    appt.doctor   = l.slice("Doctor:".length).trim();
        if (l.startsWith("Provider:"))  appt.provider = l.slice("Provider:".length).trim();
        if (l.startsWith("Date/Time:")) appt.datetime = l.slice("Date/Time:".length).trim();
        if (l.startsWith("Address:"))   appt.address  = l.slice("Address:".length).trim();
        if (l.startsWith("Maps Link:")) appt.mapsLink = l.slice("Maps Link:".length).trim();
        if (l.startsWith("Notes:"))     appt.notes    = l.slice("Notes:".length).trim();
        i++;
      }
      result.appointments.push(appt);
      continue;
    }

    i++;
  }

  return result;
}

// ── Renderer ─────────────────────────────────────────────────────────────────
function parseAndRender(text, filename) {
  const data = parseExport(text);
  report.style.display = "block";

  const initial = (data.user || data.email || "?")[0].toUpperCase();
  const isMeds  = data.type === "MEDICATIONS";
  const isAppts = data.type === "APPOINTMENTS";

  const sharingWithHTML = data.sharingWith.length
    ? data.sharingWith.map(e => `<span class="meta-pill">${e}</span>`).join("")
    : `<span class="meta-pill">Nobody</span>`;

  const canViewHTML = data.canView.length
    ? data.canView.map(e => `<span class="meta-pill red">${e}</span>`).join("")
    : `<span class="meta-pill">Nobody</span>`;

  let medsHTML = "";
  if (data.medications.length > 0) {
    medsHTML = data.medications.map(med => `
      <div class="item-card">
        <div class="item-name">💊 ${esc(med.name)}</div>
        <div class="item-rows">
          ${med.dosage    && med.dosage    !== "N/A" ? `<div class="item-row"><span class="item-row-label">Dosage</span><span class="item-row-value">${esc(med.dosage)}</span></div>` : ""}
          ${med.schedule  && med.schedule  !== "N/A" ? `<div class="item-row"><span class="item-row-label">Schedule</span><span class="item-row-value">${esc(med.schedule)}</span></div>` : ""}
          ${med.startDate && med.startDate !== "N/A" ? `<div class="item-row"><span class="item-row-label">Start</span><span class="item-row-value">${esc(med.startDate)}</span></div>` : ""}
          ${med.endDate   && med.endDate   !== "N/A" ? `<div class="item-row"><span class="item-row-label">End</span><span class="item-row-value">${esc(med.endDate)}</span></div>` : ""}
          ${med.expiryDate && med.expiryDate !== "N/A" ? `<div class="item-row"><span class="item-row-label">Expiry</span><span class="item-row-value">${esc(med.expiryDate)}</span></div>` : ""}
          ${med.notes     && med.notes     !== "None" ? `<div class="item-row"><span class="item-row-label">Notes</span><span class="item-row-value">${esc(med.notes)}</span></div>` : ""}
        </div>
      </div>
    `).join("");
  } else {
    medsHTML = `<div class="empty-msg">No medications in this export.</div>`;
  }

  let apptsHTML = "";
  if (data.appointments.length > 0) {
    apptsHTML = data.appointments.map(appt => `
      <div class="item-card">
        <div class="item-name">🩺 ${esc(appt.title)}</div>
        ${appt.datetime && appt.datetime !== "N/A" ? `<div class="appt-datetime">📅 ${esc(appt.datetime)}</div>` : ""}
        <div class="item-rows">
          ${appt.doctor   && appt.doctor   !== "N/A" ? `<div class="item-row"><span class="item-row-label">Doctor</span><span class="item-row-value">${esc(appt.doctor)}</span></div>` : ""}
          ${appt.provider && appt.provider !== "N/A" ? `<div class="item-row"><span class="item-row-label">Provider</span><span class="item-row-value">${esc(appt.provider)}</span></div>` : ""}
          ${appt.address  && appt.address  !== "N/A" ? `<div class="item-row"><span class="item-row-label">Address</span><span class="item-row-value">${esc(appt.address)}</span></div>` : ""}
          ${appt.notes    && appt.notes    !== "None" ? `<div class="item-row"><span class="item-row-label">Notes</span><span class="item-row-value">${esc(appt.notes)}</span></div>` : ""}
        </div>
        ${appt.mapsLink && appt.mapsLink !== "N/A" ? `<a class="appt-maps-link" href="${esc(appt.mapsLink)}" target="_blank">📍 Open in Google Maps →</a>` : ""}
      </div>
    `).join("");
  } else {
    apptsHTML = `<div class="empty-msg">No appointments in this export.</div>`;
  }

  // Show both sections — whichever is relevant
  const showMeds  = isMeds || data.type === "COMBINED" || data.medications.length > 0;
  const showAppts = isAppts || data.type === "COMBINED" || data.appointments.length > 0;

  report.innerHTML = `
    <div class="profile-card">
      <div class="profile-top">
        <div class="profile-avatar">${esc(initial)}</div>
        <div>
          <div class="profile-name">${esc(data.user || "Unknown")}</div>
          <div class="profile-email">${esc(data.email || "")}</div>
          ${data.exported ? `<div class="profile-exported">Exported ${esc(data.exported)}</div>` : ""}
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <div style="font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Sharing access with</div>
        <div class="profile-meta">${sharingWithHTML}</div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Can view data of</div>
        <div class="profile-meta">${canViewHTML}</div>
      </div>
    </div>

    ${showMeds ? `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Medications</div>
        <div class="section-count">${data.medications.length}</div>
      </div>
      ${medsHTML}
    </div>` : ""}

    ${showAppts ? `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Appointments</div>
        <div class="section-count">${data.appointments.length}</div>
      </div>
      ${apptsHTML}
    </div>` : ""}

    <button class="reset-btn" onclick="resetViewer()">↑ Upload a different file</button>
  `;
}

function resetViewer() {
  report.style.display = "none";
  report.innerHTML = "";
  dropZone.classList.remove("has-file");
  dropZone.querySelector(".drop-title").textContent = "Drop your export file here";
  dropZone.querySelector(".drop-sub").innerHTML = `or <span>browse to upload</span> a .txt file`;
  dropZone.querySelector(".drop-icon").textContent = "📄";
  fileInput.value = "";
}

function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
