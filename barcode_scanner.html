<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <title>Scan Medication – MyPills</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
    *{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
    body{background:#f7f7f5;min-height:100vh;padding:48px 20px;}

    /* HEADER - EXACT SAME AS PROVIDED */
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 40px;
      background:rgba(255,255,255,0.75);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(0,0,0,0.08);
      position:sticky;top:0;z-index:100;
    }
    .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#1a1a1a;text-decoration:none;}
    .logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
    .header-right{display:flex;align-items:center;gap:12px;}
    .header-user{font-size:13px;color:#888;}
    .btn-logout{background:transparent;color:#c0392b;border:1.5px solid #c0392b;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-logout:hover{background:#c0392b;color:#fff;}

    /* PAGE STYLING */
    #scanner{width:100%;max-width:480px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
    #results{margin-top:24px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
    .label{font-weight:700;color:#c0392b;margin-top:10px;}
    .value{margin-bottom:8px;color:#1a1a1a;}
    .info-row{margin-bottom:6px;}
    button.scan-btn{background:#c0392b;color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;cursor:pointer;margin-top:16px;}
    button.scan-btn:hover{background:#a93226;}
    </style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><img src="pill.png"> MyPills</a>
  <div class="header-right">
    <span class="header-user" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</header>

<div class="page">
    <div id="scanner"></div>
    <button class="scan-btn" id="startScan">Start Scanning</button>

    <div id="results" style="display:none;">
        <div class="info-row"><span class="label">Brand Name:</span> <span class="value" id="brandName">-</span></div>
        <div class="info-row"><span class="label">Generic Name:</span> <span class="value" id="genericName">-</span></div>
        <div class="info-row"><span class="label">Dosage Form:</span> <span class="value" id="dosageForm">-</span></div>
        <div class="info-row"><span class="label">Manufacturer:</span> <span class="value" id="manufacturer">-</span></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, browserLocalPersistence, setPersistence, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

setPersistence(auth, browserLocalPersistence).then(() => {
    onAuthStateChanged(auth, user => {
        if(!user){ window.location="index.html"; return; }
        document.getElementById("userEmail").textContent = user.displayName || user.email;
    });
});

function logout(){ signOut(auth).then(()=>{ window.location="index.html"; }); }
window.logout = logout;

document.getElementById("startScan").addEventListener("click", ()=>{
    Quagga.init({
        inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: { facingMode: "environment" }
        },
        decoder: { readers: ["upc_reader","ean_reader"] },
        locate: true
    }, function(err){
        if(err){ console.error(err); return; }
        Quagga.start();
    });

    Quagga.onDetected(async function(data){
        const code = data.codeResult.code;
        Quagga.stop();
        fetchMedicationInfo(code);
    });
});

async function fetchMedicationInfo(barcode){
    const resultsDiv = document.getElementById("results");
    resultsDiv.style.display="block";
    document.getElementById("brandName").textContent = "Loading...";
    document.getElementById("genericName").textContent = "-";
    document.getElementById("dosageForm").textContent = "-";
    document.getElementById("manufacturer").textContent = "-";

    try{
        const res = await fetch(`https://api.fda.gov/drug/ndc.json?search=product_ndc:"${barcode}"&limit=1`);
        const data = await res.json();
        if(data.results && data.results.length>0){
            const med = data.results[0];
            document.getElementById("brandName").textContent = med.brand_name || "-";
            document.getElementById("genericName").textContent = med.generic_name || "-";
            document.getElementById("dosageForm").textContent = med.dosage_form || "-";
            document.getElementById("manufacturer").textContent = med.labeler_name || "-";
        } else {
            document.getElementById("brandName").textContent = "Not found";
        }
    } catch(e){
        console.error(e);
        document.getElementById("brandName").textContent = "Error fetching data";
    }
}
</script>
</body>
</html>
