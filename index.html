<!DOCTYPE html>
<html>
<head>
<title>MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid #ddd;background:white;}
.logo{display:flex;align-items:center;font-size:24px;font-weight:600;cursor:pointer;}
.logo img{height:40px;margin-right:10px;}
.nav button{border:1px solid black;border-radius:6px;padding:8px 16px;background:white;color:black;transition:all .25s ease;}
.nav button:hover,.nav button:active{background:black;color:white;cursor:pointer;}
.page{padding:80px;animation:slideIn .45s ease;text-align:center;}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
</style>
</head>

<body>
<header>
<div class="logo" onclick="window.location='index.html'">
<img src="pill.png">MyPills
</div>

<div class="nav">
<button onclick="window.location='continue.html'">Continue</button>
</div>
</header>

<div class="page">
<h1>Welcome to MyPills</h1>
<p>Click Continue to sign in and manage your medications.</p>
</div>
</body>
</html>
