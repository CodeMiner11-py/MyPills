<!DOCTYPE html>
<html>
<head>
<title>MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}

body{background:#fff;overflow-x:hidden;}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}

.nav button{
  background:#c0392b;color:#fff;border:none;
  border-radius:8px;padding:10px 22px;
  font-size:14px;font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 4px 14px rgba(192,57,43,0.35);
}
.nav button:hover{background:#a93226;transform:translateY(-1px);box-shadow:0 6px 18px rgba(192,57,43,0.4);}
.nav button:active{transform:scale(0.97);}

/* HERO */
.hero{
  position:relative;
  width:100%;
  overflow:hidden;
}
.hero img.bg{
  width:100%;height:auto;display:block;
  margin-top:-80px;
}

.hero-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding-bottom:60px;
  animation:fadeUp .55s ease both;
}

.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(192,57,43,0.1);
  color:#c0392b;
  border:1px solid rgba(192,57,43,0.2);
  border-radius:100px;
  padding:5px 14px;
  font-size:12px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:20px;
}

.hero h1{
  font-size:clamp(2.6rem,5vw,4rem);
  font-weight:700;
  color:#1a1a1a;
  line-height:1.1;
  letter-spacing:-0.03em;
  margin-bottom:16px;
  text-align:center;
}
.hero h1 span{color:#c0392b;}

.hero p{
  font-size:1.05rem;
  color:#555;
  font-weight:400;
  margin-bottom:32px;
  text-align:center;
  max-width:420px;
  line-height:1.65;
}

.hero-btn{
  background:#c0392b;color:#fff;border:none;
  border-radius:10px;padding:14px 32px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 6px 20px rgba(192,57,43,0.35);
  text-decoration:none;display:inline-block;
}
.hero-btn:hover{background:#a93226;transform:translateY(-2px);box-shadow:0 10px 28px rgba(192,57,43,0.4);}
.hero-btn:active{transform:scale(0.97);}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <img src="pill.png"> MyPills
  </a>
  <div class="nav">
    <button onclick="window.location='continue.html'">Get Started</button>
  </div>
</header>

<div class="hero">
  <img class="bg" src="bg.png">
  <div class="hero-overlay">
    <div class="hero-badge">Your medication companion</div>
    <h1>Never miss a<br><span>dose</span> again.</h1>
    <p>Track medications, get timely reminders, and share with caregivers, all in one place.</p>
    <a class="hero-btn" href="continue.html">Continue with Google</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if(user) window.location = "app.html";
});
</script>

</body>
</html>
