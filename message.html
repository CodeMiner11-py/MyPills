<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="logo.png">
  <title>Chat – MyPills</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
    body{background:#f7f7f5;min-height:100vh;color:#1a1a1a;}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.08);position:sticky;top:0;z-index:100;}
    .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a1a;text-decoration:none;}
    .logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
    .header-user{font-size:13px;color:#888;margin-right:12px;}
    .btn-logout{background:transparent;color:#c0392b;border:1.5px solid #c0392b;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s ease;}
    .btn-logout:hover{background:#c0392b;color:#fff;}
    .page{max-width:560px;margin:0 auto;padding:48px 20px;}
    .chat-select{margin-bottom:24px;}
    select{width:100%;padding:12px;border-radius:12px;border:1.5px solid #eee;font-size:14px;background:#fafafa;outline:none;}
    .messages{background:#fff;border-radius:20px;padding:20px;height:400px;overflow-y:auto;margin-bottom:16px;box-shadow:0 8px 40px rgba(0,0,0,0.05);}
    .msg{margin-bottom:12px;padding:10px 14px;border-radius:12px;max-width:70%;line-height:1.4;}
    .msg.mine{background:#c0392b;color:#fff;margin-left:auto;}
    .msg.other{background:#eee;margin-right:auto;color:#1a1a1a;}
    .msg-input{display:flex;gap:12px;}
    .msg-input input{flex:1;padding:12px;border-radius:12px;border:1.5px solid #eee;outline:none;font-size:14px;}
    .msg-input button{padding:12px 16px;background:#c0392b;color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s;}
    .msg-input button:hover{transform:translateY(-1px);}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(40px);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:all 0.4s ease;z-index:1000;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.error{background:#c0392b;}
    .toast.success{background:#27ae60;}
  </style>
</head>
<body>

<header>
  <a class="logo" href="app.html"><img src="pill.png"> MyPills</a>
  <div>
    <span class="header-user" id="userHeaderEmail"></span>
    <button class="btn-logout" id="logoutBtn">Log Out</button>
  </div>
</header>

<div class="page">
  <div class="chat-select">
    <label>Select a person to chat with:</label>
    <select id="personSelect"><option>Loading...</option></select>
  </div>
  <div class="messages" id="messages"></div>
  <div class="msg-input">
    <input type="text" id="msgInput" placeholder="Type a message…">
    <button id="sendBtn">Send</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9b4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const toast = document.getElementById("toast");
function showToast(msg, type=""){toast.textContent=msg;toast.className="toast show"+(type?" "+type:"");setTimeout(()=>toast.classList.remove("show"),3500);}

document.getElementById("logoutBtn").addEventListener("click",()=>signOut(auth).then(()=>window.location.href="index.html"));

let currentUser=null;
let chatRef=null;
let unsubscribe=null;

async function getUIDFromEmail(email){
  const usersRef=collection(db,"users");
  const q=query(usersRef,where("email","==",email));
  const snap=await getDocs(q);
  if(!snap.empty)return snap.docs[0].id;
  return null;
}

function scrollToBottom(){const m=document.getElementById("messages");m.scrollTop=m.scrollHeight;}

setPersistence(auth,browserLocalPersistence).then(()=>{
  onAuthStateChanged(auth,async user=>{
    if(!user){window.location="continue.html";return;}
    currentUser=user;
    document.getElementById("userHeaderEmail").textContent=user.email;

    const usersDoc=doc(db,"users",user.uid);
    const snap=await getDocs(collection(db,"users"));
    const select=document.getElementById("personSelect");
    select.innerHTML="";

    // Add caregivers
    const userSnap=await getDocs(collection(db,"users"));
    for(const u of userSnap.docs){
      const data=u.data();
      if((data.caregivers||[]).includes(user.email)||u.id===user.uid) continue;
      if((data.caregivers||[]).includes(user.email)||data.patients?.includes(user.email)) select.innerHTML+=`<option value="${data.email}">${data.email}</option>`;
    }

    select.addEventListener("change",()=>{setupChat(select.value);});
    if(select.options.length>0) setupChat(select.value);
  });
});

async function setupChat(email){
  if(unsubscribe) unsubscribe();
  const otherUID=await getUIDFromEmail(email);
  if(!otherUID){showToast("User not found","error");return;}
  const ids=[currentUser.uid,otherUID].sort();
  const chatID=ids.join("_");
  const messagesDiv=document.getElementById("messages");
  messagesDiv.innerHTML="Loading…";

  const q=query(collection(db,"messages",chatID,"msgs"),orderBy("timestamp"));
  unsubscribe=onSnapshot(q,snap=>{
    messagesDiv.innerHTML="";
    snap.forEach(doc=>{
      const d=doc.data();
      const div=document.createElement("div");
      div.className="msg "+(d.senderUID===currentUser.uid?"mine":"other");
      div.textContent=d.message;
      messagesDiv.appendChild(div);
    });
    scrollToBottom();
  });

  document.getElementById("sendBtn").onclick=async ()=>{
    const msgInput=document.getElementById("msgInput");
    const text=msgInput.value.trim();
    if(!text)return;
    msgInput.value="";
    try{
      await addDoc(collection(db,"messages",chatID,"msgs"),{
        message:text,
        senderUID:currentUser.uid,
        timestamp:new Date()
      });
    }catch(e){showToast("Failed to send","error");}
  };
}
</script>
</body>
</html>
