<!DOCTYPE html>
<html>
<head>
<title>Appointments – MyPills</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f5;min-height:100vh;}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#1a1a1a;text-decoration:none;}
.logo img{height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));}
.header-right{display:flex;align-items:center;gap:12px;}
.header-user{font-size:13px;color:#888;}
.btn-logout{background:transparent;color:#c0392b;border:1.5px solid #c0392b;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-logout:hover{background:#c0392b;color:#fff;}

.page{max-width:700px;margin:0 auto;padding:48px 20px;animation:fadeUp .45s ease both;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-header-left{}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#aaa;text-decoration:none;margin-bottom:10px;transition:color .2s;}
.back-link:hover{color:#c0392b;}
.page h1{font-size:1.7rem;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em;}
.page h1 span{color:#c0392b;}

.add-btn{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(192,57,43,0.3);text-decoration:none;display:inline-block;white-space:nowrap;}
.add-btn:hover{background:#a93226;transform:translateY(-1px);}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:24px;}
.filter-tab{padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e8e8e8;background:#fff;color:#888;transition:all .2s;}
.filter-tab.active{background:#c0392b;color:#fff;border-color:#c0392b;}
.filter-tab:hover:not(.active){border-color:#c0392b;color:#c0392b;}

.state-msg{text-align:center;padding:60px 20px;color:#bbb;font-size:0.95rem;}

/* APPT CARD */
.appt-card{
  background:#fff;border-radius:16px;padding:24px;
  margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);
  border:1px solid rgba(0,0,0,0.04);
  transition:box-shadow .2s;cursor:pointer;
}
.appt-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.1);}
.appt-card.past{opacity:0.65;}

.appt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.appt-left{}
.appt-title{font-size:1.05rem;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.appt-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.appt-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#fff0ef;color:#c0392b;}
.appt-tag.grey{background:#f0f0ee;color:#888;}
.appt-tag.past{background:#f5f5f5;color:#bbb;}

.appt-datetime{font-size:13px;color:#888;margin-top:8px;display:flex;align-items:center;gap:6px;}
.appt-datetime strong{color:#1a1a1a;}

.view-btn{background:transparent;color:#c0392b;border:1.5px solid #c0392b;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.view-btn:hover{background:#c0392b;color:#fff;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.15);transform:translateY(20px) scale(0.97);transition:transform .25s;position:relative;max-height:90vh;overflow-y:auto;}
.modal-backdrop.open .modal{transform:translateY(0) scale(1);}
.modal-close{position:absolute;top:18px;right:20px;background:none;border:none;font-size:20px;color:#bbb;cursor:pointer;transition:color .2s;}
.modal-close:hover{color:#1a1a1a;}
.modal h2{font-size:1.3rem;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.modal-subtitle{font-size:13px;color:#aaa;margin-bottom:24px;}

.modal-row{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f5f5f3;}
.modal-row:last-of-type{border-bottom:none;}
.modal-row-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.modal-row-label{font-size:11px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}
.modal-row-value{font-size:14px;color:#1a1a1a;font-weight:500;line-height:1.5;}

/* MAP */
.map-frame{width:100%;height:200px;border-radius:12px;border:none;margin-top:8px;display:block;}

.delete-btn{width:100%;margin-top:20px;padding:12px;background:transparent;color:#c0392b;border:1.5px solid #c0392b;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.delete-btn:hover{background:#c0392b;color:#fff;}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#c0392b;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><img src="pill.png"> MyPills</a>
  <div class="header-right">
    <span class="header-user" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <div class="page-header-left">
      <a class="back-link" href="app.html">← Back to dashboard</a>
      <h1>My <span>Appointments</span></h1>
    </div>
    <a class="add-btn" href="new_doctors.html">+ New Appointment</a>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" id="tab-upcoming" onclick="setFilter('upcoming')">Upcoming</button>
    <button class="filter-tab" id="tab-past" onclick="setFilter('past')">Past</button>
    <button class="filter-tab" id="tab-all" onclick="setFilter('all')">All</button>
  </div>

  <div id="apptList"><div class="state-msg">Loading appointments...</div></div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h2 id="modalTitle"></h2>
    <div class="modal-subtitle" id="modalSubtitle"></div>

    <div class="modal-row">
      <div class="modal-row-icon">🩺</div>
      <div>
        <div class="modal-row-label">Doctor</div>
        <div class="modal-row-value" id="modalDoctor"></div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-row-icon">🏥</div>
      <div>
        <div class="modal-row-label">Provider</div>
        <div class="modal-row-value" id="modalProvider"></div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-row-icon">📅</div>
      <div>
        <div class="modal-row-label">Date & Time</div>
        <div class="modal-row-value" id="modalDatetime"></div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-row-icon">📍</div>
      <div style="width:100%;">
        <div class="modal-row-label">Address</div>
        <div class="modal-row-value" id="modalAddress"></div>
        <iframe id="modalMap" class="map-frame" allowfullscreen loading="lazy"></iframe>
      </div>
    </div>
    <div class="modal-row" id="modalDescRow">
      <div class="modal-row-icon">📝</div>
      <div>
        <div class="modal-row-label">Notes</div>
        <div class="modal-row-value" id="modalDesc"></div>
      </div>
    </div>

    <button class="delete-btn" id="modalDeleteBtn">Delete Appointment</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5rbhwAh4aFVKAUNGf63fPsZafhZBXeTA",
  authDomain: "mypills-f768a.firebaseapp.com",
  projectId: "mypills-f768a",
  storageBucket: "mypills-f768a.appspot.com",
  messagingSenderId: "150822030429",
  appId: "1:150822030429:web:6805cc679e0a35f3d9d1b4",
  measurementId: "G-4CSFQDQG8S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;
let allAppts = [];
let currentFilter = "upcoming";
let currentApptId = null;

setPersistence(auth, browserLocalPersistence).then(() => {
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location = "continue.html"; return; }
    currentUser = user;
    document.getElementById("userEmail").textContent = user.displayName || user.email;
    await loadAppts();
  });
});

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "") + " show";
  setTimeout(() => t.className = "toast", 3000);
}

function fmtDatetime(ts) {
  if (!ts) return "N/A";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" })
    + " at " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

function fmtDateShort(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })
    + " · " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

function isPast(ts) {
  if (!ts) return false;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d < new Date();
}

async function loadAppts() {
  const snap = await getDocs(collection(db, "users", currentUser.uid, "appts"));
  allAppts = snap.docs
    .filter(d => d.data().title)
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => {
      const ta = a.datetime?.toDate ? a.datetime.toDate() : new Date(0);
      const tb = b.datetime?.toDate ? b.datetime.toDate() : new Date(0);
      return ta - tb;
    });
  renderList();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
  document.getElementById(`tab-${filter}`).classList.add("active");
  renderList();
}

function renderList() {
  const list = document.getElementById("apptList");
  const now = new Date();

  let appts = allAppts;
  if (currentFilter === "upcoming") appts = allAppts.filter(a => !isPast(a.datetime));
  if (currentFilter === "past")     appts = allAppts.filter(a => isPast(a.datetime)).reverse();

  if (appts.length === 0) {
    const msgs = { upcoming:"No upcoming appointments.", past:"No past appointments.", all:"No appointments yet." };
    list.innerHTML = `<div class="state-msg">${msgs[currentFilter]}</div>`;
    return;
  }

  list.innerHTML = "";
  for (const appt of appts) {
    const past = isPast(appt.datetime);
    const card = document.createElement("div");
    card.className = "appt-card" + (past ? " past" : "");
    card.onclick = () => openModal(appt.id);

    card.innerHTML = `
      <div class="appt-top">
        <div class="appt-left">
          <div class="appt-title">${appt.title}</div>
          <div class="appt-meta">
            <span class="appt-tag">${appt.doctor}</span>
            ${appt.provider ? `<span class="appt-tag grey">${appt.provider}</span>` : ""}
            ${past ? `<span class="appt-tag past">Past</span>` : `<span class="appt-tag" style="background:#e8f8f0;color:#27ae60;">Upcoming</span>`}
          </div>
          <div class="appt-datetime">📅 <strong>${fmtDateShort(appt.datetime)}</strong></div>
        </div>
        <button class="view-btn">View</button>
      </div>
    `;
    list.appendChild(card);
  }
}

function openModal(apptId) {
  const appt = allAppts.find(a => a.id === apptId);
  if (!appt) return;
  currentApptId = apptId;

  document.getElementById("modalTitle").textContent = appt.title;
  document.getElementById("modalSubtitle").textContent = isPast(appt.datetime) ? "Past appointment" : "Upcoming appointment";
  document.getElementById("modalDoctor").textContent = appt.doctor || "N/A";
  document.getElementById("modalProvider").textContent = appt.provider || "N/A";
  document.getElementById("modalDatetime").textContent = fmtDatetime(appt.datetime);
  document.getElementById("modalAddress").textContent = appt.address || "N/A";

  // Google Maps embed using search query (no API key needed for embed)
  const mapQuery = encodeURIComponent(appt.address || "");
  document.getElementById("modalMap").src =
    `https://maps.google.com/maps?q=${mapQuery}&output=embed&z=15`;

  const descRow = document.getElementById("modalDescRow");
  if (appt.description) {
    document.getElementById("modalDesc").textContent = appt.description;
    descRow.style.display = "flex";
  } else {
    descRow.style.display = "none";
  }

  document.getElementById("modalDeleteBtn").onclick = () => deleteAppt(apptId);
  document.getElementById("modalBackdrop").classList.add("open");
}

function closeModal(e) {
  if (e.target === document.getElementById("modalBackdrop")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modalBackdrop").classList.remove("open");
  document.getElementById("modalMap").src = "";
  currentApptId = null;
}

async function deleteAppt(apptId) {
  if (!confirm("Delete this appointment?")) return;
  try {
    await deleteDoc(doc(db, "users", currentUser.uid, "appts", apptId));
    closeModalDirect();
    showToast("Appointment deleted.");
    await loadAppts();
  } catch(e) {
    showToast("Error: " + e.message, true);
  }
}

async function logout() {
  await signOut(auth);
  window.location = "index.html";
}

window.setFilter = setFilter;
window.openModal = openModal;
window.closeModal = closeModal;
window.closeModalDirect = closeModalDirect;
window.logout = logout;
</script>
</body>
</html>
