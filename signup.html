<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
*{font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;box-sizing:border-box;}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 32px;
border-bottom:1px solid #ddd;
background:white;
}

.logo{
display:flex;
align-items:center;
font-size:24px;
font-weight:600;
}

.logo img{height:40px;margin-right:10px;}

.nav button{
border:1px solid black;
border-radius:6px;
padding:8px 16px;
background:white;
color:black;
transition:all .25s ease;
}

.nav button:hover,
.nav button:active{
background:black;
color:white;
cursor:pointer;
}

.page{
max-width:400px;
margin:100px auto;
animation:slideIn .45s ease;
}
@keyframes slideIn{
from{transform:translateX(100px);opacity:0;}
to{transform:translateX(0);opacity:1;}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="pill.png">
MyPills
</div>

<div class="nav">
<button onclick="googleLogin()">Sign Up with Google</button>
</div>
</header>

<div class="page">
<h2>Sign Up</h2>
<p>Click the button above to create an account using Google.</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  /* your Firebase config */
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

function googleLogin(){
  signInWithPopup(auth, provider)
    .then(result=>{
      localStorage.setItem("token", result.user.uid);
      window.location="app.html";
    })
    .catch(e=>alert(e.message));
}

window.googleLogin=googleLogin;
</script>

</body>
</html>
